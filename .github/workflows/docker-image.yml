name: Build and Push Docker Image

on:
  push:
    branches: ["main"]

jobs:

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t thirdgodiswinning180/test:latest .

      - name: Push image
        run: docker push thirdgodiswinning180/test:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # passphrase: ${{ secrets.SERVER_KEY_PASSPHRASE }}
          script: |
            docker pull thirdgodiswinning180/test:latest
            docker stop test-api || true
            docker rm test-api || true
            docker run -d --name test-api -p 3001:3000 thirdgodiswinning180/test:latest
